name: Reproducibility checks

on:
  push:
  pull_request:

jobs:
  quick-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install test environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r environment/requirements.lock
          python -m pip install pytest==9.0.2
      - name: Compile source
        run: python -m compileall -q entrypoints scripts scripts_current src src_current tests
      - name: Run tests
        run: python -m pytest -q
      - name: Reproduce bundled analysis
        run: python entrypoints/quick_reproduce.py
